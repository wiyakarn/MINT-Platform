<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SQA Work Plan — สร้างโครงการ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EEF0F6;--surface:#FFFFFF;--surface-2:#F5F6FB;
    --ink:#191C2B;--ink-soft:#4A4F63;--muted:#8A8FA3;
    --line:#E4E6F0;--line-strong:#CFD2E2;
    --indigo:#4F46E5;--indigo-deep:#3F37C9;--indigo-tint:#EAE8FD;
    --ok:#0E9F6E;--ok-tint:#DEF5EC;--warn:#C2410C;--warn-tint:#FBE7DC;--hold:#9A6A12;--hold-tint:#F5ECCF;
    /* pillar colors */
    --p1:#0E7C86;--p1t:#DBF1F2; --p2:#B45309;--p2t:#FBEBD4; --p3:#A21CAF;--p3t:#F6E2F7; --p4:#1D4ED8;--p4t:#E0E8FD; --p5:#0E9F6E;--p5t:#DEF5EC;
    --shadow-lift:0 10px 40px rgba(40,44,80,.16);
    --radius:16px;--radius-sm:11px;
    --font:"Anuphan",system-ui,sans-serif;--mono:"IBM Plex Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:var(--font);background:var(--bg);color:var(--ink);line-height:1.45;-webkit-font-smoothing:antialiased;display:flex;justify-content:center;}
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(120% 60% at 50% -10%, rgba(79,70,229,.10), transparent 60%),radial-gradient(80% 50% at 100% 110%, rgba(14,124,134,.06), transparent 60%);}

  .app{position:relative;z-index:1;width:100%;max-width:460px;min-height:100%;background:var(--surface);display:flex;flex-direction:column;box-shadow:var(--shadow-lift);}
  @media(min-width:540px){body{align-items:center;padding:28px 16px;}.app{min-height:auto;height:min(884px,calc(100vh - 56px));border-radius:30px;overflow:hidden;}}

  header.top{flex:none;padding:16px 20px 13px;background:linear-gradient(180deg,#FBFBFE,#FFFFFF);border-bottom:1px solid var(--line);}
  .brand{display:flex;align-items:center;gap:11px;}
  .mark{width:40px;height:40px;border-radius:11px;flex:none;background:linear-gradient(145deg,var(--indigo),var(--indigo-deep));display:grid;place-items:center;color:#fff;box-shadow:0 4px 12px rgba(79,70,229,.34);}
  .mark svg{width:22px;height:22px;}
  .brand-txt{flex:1;min-width:0;}
  .brand-txt h1{font-size:15px;font-weight:700;letter-spacing:-.01em;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .brand-txt p{font-size:10px;color:var(--muted);font-weight:500;letter-spacing:.05em;text-transform:uppercase;margin-top:1px;}
  .doc-ref{flex:none;text-align:right;}
  .doc-ref .lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;font-weight:600;}
  .doc-ref .val{font-family:var(--mono);font-size:11.5px;font-weight:600;color:var(--ink-soft);}

  .stepper{display:flex;align-items:center;gap:0;margin-top:14px;}
  .stepper .node{display:flex;flex-direction:column;align-items:center;flex:none;width:32px;cursor:pointer;}
  .stepper .dot{width:29px;height:29px;border-radius:50%;display:grid;place-items:center;font-size:12px;font-weight:600;font-family:var(--mono);background:var(--surface-2);border:1.5px solid var(--line-strong);color:var(--muted);transition:.35s cubic-bezier(.4,0,.2,1);}
  .stepper .node[data-state="done"] .dot{background:var(--indigo);border-color:var(--indigo);color:#fff;}
  .stepper .node[data-state="active"] .dot{background:#fff;border-color:var(--indigo);color:var(--indigo-deep);box-shadow:0 0 0 4px var(--indigo-tint);}
  .stepper .bar{flex:1;height:2px;background:var(--line-strong);position:relative;border-radius:2px;}
  .stepper .bar i{position:absolute;inset:0;width:0;background:var(--indigo);border-radius:2px;transition:width .4s ease;}

  .body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
  .body::-webkit-scrollbar{width:0;}
  .step-head{padding:20px 22px 4px;}
  .step-kicker{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:600;color:var(--indigo-deep);text-transform:uppercase;letter-spacing:.06em;}
  .step-kicker .seg{font-family:var(--mono);}
  .step-head h2{font-size:21px;font-weight:700;letter-spacing:-.01em;margin-top:6px;}
  .step-head .sub{font-size:12.5px;color:var(--muted);margin-top:3px;}
  .fields{padding:14px 22px 24px;display:flex;flex-direction:column;gap:16px;}

  .field{opacity:1;}
  .field > label.flabel{display:flex;align-items:baseline;gap:7px;margin-bottom:7px;flex-wrap:wrap;}
  .flabel .th{font-size:13.5px;font-weight:600;color:var(--ink);}
  .flabel .en{font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-family:var(--mono);}
  .flabel .req{color:var(--warn);font-weight:700;}

  .ctrl{width:100%;font-family:var(--font);font-size:15px;font-weight:500;color:var(--ink);background:var(--surface-2);border:1.5px solid var(--line);border-radius:var(--radius-sm);padding:13px 14px;transition:.18s;appearance:none;outline:none;}
  .ctrl::placeholder{color:#AEB3C4;font-weight:400;}
  .ctrl:focus{border-color:var(--indigo);background:#fff;box-shadow:0 0 0 4px var(--indigo-tint);}
  textarea.ctrl{resize:none;min-height:82px;line-height:1.5;}

  .selwrap{position:relative;}
  .selwrap::after{content:"";position:absolute;right:15px;top:50%;width:9px;height:9px;border-right:2px solid var(--indigo-deep);border-bottom:2px solid var(--indigo-deep);transform:translateY(-65%) rotate(45deg);pointer-events:none;}
  select.ctrl{padding-right:38px;cursor:pointer;}
  select.ctrl.placeheld{color:#AEB3C4;font-weight:400;}

  .grp{background:var(--surface-2);border:1.5px solid var(--line);border-radius:var(--radius-sm);padding:13px 14px;}
  .grp.focuswithin{border-color:var(--line-strong);}
  .grp .grp-cols{display:flex;gap:12px;}
  .grp .col{flex:1;min-width:0;}
  .sublbl{font-size:10.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;display:block;}
  .mini{width:100%;font-family:var(--font);font-size:14px;font-weight:600;color:var(--ink);background:#fff;border:1.5px solid var(--line);border-radius:9px;padding:10px 12px;outline:none;transition:.18s;appearance:none;}
  .mini:focus{border-color:var(--indigo);box-shadow:0 0 0 3px var(--indigo-tint);}
  .grp .selwrap::after{right:11px;width:7px;height:7px;}
  select.mini{padding-right:28px;cursor:pointer;}

  /* pillar cards */
  .pillars{display:flex;flex-direction:column;gap:9px;}
  .pillar{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--line);background:var(--surface-2);cursor:pointer;transition:.16s;}
  .pillar .pnum{width:30px;height:30px;border-radius:9px;flex:none;display:grid;place-items:center;font-family:var(--mono);font-size:13px;font-weight:600;background:#fff;border:1.5px solid var(--line-strong);color:var(--muted);transition:.16s;}
  .pillar .pt{font-size:13.5px;font-weight:600;line-height:1.25;}
  .pillar .pd{font-size:11px;color:var(--muted);margin-top:1px;}
  .pillar.sel{border-color:var(--pc);background:var(--pct);}
  .pillar.sel .pnum{background:var(--pc);border-color:var(--pc);color:#fff;}

  /* milestone gates */
  .gates{display:flex;flex-direction:column;gap:9px;}
  .gate{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--line);background:var(--surface-2);cursor:pointer;transition:.16s;}
  .gate .gcode{width:38px;height:38px;border-radius:50%;flex:none;display:grid;place-items:center;font-family:var(--mono);font-size:13px;font-weight:700;background:#fff;border:2px solid var(--line-strong);color:var(--muted);transition:.16s;}
  .gate .gmid{flex:1;min-width:0;}
  .gate .gt{font-size:13.5px;font-weight:700;}
  .gate .gd{font-size:11px;color:var(--muted);line-height:1.3;margin-top:1px;}
  .gate .gpct{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--muted);flex:none;}
  .gate.sel{border-color:var(--indigo);background:var(--indigo-tint);}
  .gate.sel .gcode{background:var(--indigo);border-color:var(--indigo);color:#fff;}
  .gate.sel .gpct{color:var(--indigo-deep);}
  .gate.passed .gcode{background:#fff;border-color:var(--indigo);color:var(--indigo-deep);}

  /* progress slider */
  .progwrap{background:var(--surface-2);border:1.5px solid var(--line);border-radius:var(--radius-sm);padding:16px 15px 13px;}
  .progwrap .ptop{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:11px;}
  .progwrap .pval{font-family:var(--mono);font-size:26px;font-weight:700;color:var(--indigo-deep);line-height:1;}
  .progwrap .ptag{font-size:11.5px;font-weight:600;color:var(--muted);}
  input[type=range]{width:100%;-webkit-appearance:none;appearance:none;height:8px;border-radius:6px;background:var(--line-strong);outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:#fff;border:3px solid var(--indigo);box-shadow:0 2px 6px rgba(79,70,229,.4);cursor:pointer;}
  input[type=range]::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:#fff;border:3px solid var(--indigo);cursor:pointer;}
  .progwrap .pscale{display:flex;justify-content:space-between;margin-top:8px;font-family:var(--mono);font-size:10px;color:var(--muted);}

  /* segment */
  .segment{display:flex;gap:8px;flex-wrap:wrap;}
  .segbtn{flex:1 1 calc(50% - 4px);display:flex;align-items:center;justify-content:center;gap:7px;padding:12px;border-radius:var(--radius-sm);border:1.5px solid var(--line);background:var(--surface-2);font-family:var(--font);font-size:13.5px;font-weight:600;color:var(--ink-soft);cursor:pointer;transition:.15s;}
  .segbtn .sc{width:9px;height:9px;border-radius:50%;background:var(--line-strong);flex:none;transition:.15s;}
  .segbtn.on{border-color:var(--indigo);background:var(--indigo-tint);color:var(--indigo-deep);}
  .segbtn.on .sc{background:var(--indigo);}
  .segbtn.on[data-tone="ok"]{border-color:var(--ok);background:var(--ok-tint);color:var(--ok);} .segbtn.on[data-tone="ok"] .sc{background:var(--ok);}
  .segbtn.on[data-tone="hold"]{border-color:var(--hold);background:var(--hold-tint);color:var(--hold);} .segbtn.on[data-tone="hold"] .sc{background:var(--hold);}
  .segbtn.on[data-tone="muted"]{border-color:var(--line-strong);background:#EFF0F5;color:var(--ink-soft);} .segbtn.on[data-tone="muted"] .sc{background:var(--ink-soft);}

  /* task list */
  .tasklist{display:flex;flex-direction:column;gap:10px;}
  .task{background:var(--surface-2);border:1.5px solid var(--line);border-radius:var(--radius-sm);padding:12px;position:relative;}
  .task .timeta{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px;align-items:center;}
  .task .tchip{font-size:10px;font-weight:700;font-family:var(--mono);background:#fff;border:1.5px solid var(--line-strong);border-radius:6px;padding:2px 7px;color:var(--ink-soft);}
  .task .tchip.brand{background:var(--indigo);border-color:var(--indigo);color:#fff;}
  .task .tproj{flex-basis:100%;font-size:11px;color:var(--muted);line-height:1.4;margin-top:2px;}
  .task .trow1{display:flex;align-items:center;gap:9px;margin-bottom:9px;}
  .task .tnum{width:24px;height:24px;border-radius:7px;flex:none;background:var(--indigo);color:#fff;display:grid;place-items:center;font-family:var(--mono);font-size:11px;font-weight:600;}
  .task .tdel{margin-left:auto;width:26px;height:26px;border-radius:7px;border:1.5px solid var(--line-strong);background:#fff;color:var(--warn);font-size:15px;cursor:pointer;display:grid;place-items:center;flex:none;}
  .task .tcols{display:flex;gap:9px;}
  .task .tcols .col{flex:1;min-width:0;}
  .add-task{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;border-radius:var(--radius-sm);border:1.5px dashed var(--line-strong);background:var(--surface-2);color:var(--indigo-deep);font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:.15s;}
  .add-task:hover{border-color:var(--indigo);background:var(--indigo-tint);}
  .add-task svg{width:17px;height:17px;}

  .hint{font-size:11.5px;color:var(--muted);margin-top:-3px;}
  .err-msg{font-size:11.5px;color:var(--warn);font-weight:600;margin-top:6px;display:none;}
  .field.invalid .ctrl,.field.invalid .pillars,.field.invalid .gates,.field.invalid .segment{outline:1.5px solid var(--warn);outline-offset:3px;border-radius:var(--radius-sm);}
  .field.invalid .err-msg{display:block;}

  .savebar{flex:none;display:flex;align-items:center;justify-content:center;gap:7px;font-size:11px;font-weight:600;color:var(--muted);padding:7px;background:var(--surface-2);border-top:1px solid var(--line);}
  .savebar .sd{width:7px;height:7px;border-radius:50%;background:var(--ok);}
  .savebar.flash{color:var(--ok);}
  .savebar.flash .sd{animation:pulse .9s;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(14,159,110,.5);}100%{box-shadow:0 0 0 7px rgba(14,159,110,0);}}

  footer.nav{flex:none;display:flex;gap:10px;padding:14px 18px;padding-bottom:calc(14px + env(safe-area-inset-bottom));background:#fff;border-top:1px solid var(--line);}
  .btn{flex:1;font-family:var(--font);font-size:15px;font-weight:600;border-radius:13px;padding:15px;cursor:pointer;border:1.5px solid transparent;transition:.18s;display:flex;align-items:center;justify-content:center;gap:8px;}
  .btn:active{transform:scale(.98);}
  .btn-primary{background:var(--indigo);color:#fff;box-shadow:0 6px 16px rgba(79,70,229,.3);}
  .btn-primary:hover{background:var(--indigo-deep);}
  .btn-ghost{background:#fff;color:var(--ink-soft);border-color:var(--line-strong);flex:0 0 auto;width:54px;}
  .btn svg{width:18px;height:18px;}

  .review-group{margin:0 22px 16px;background:var(--surface-2);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
  .review-group .rg-head{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;background:#fff;border-bottom:1px solid var(--line);}
  .review-group .rg-head .t{font-size:13px;font-weight:700;}
  .review-group .rg-head .edit{font-size:12px;font-weight:600;color:var(--indigo-deep);cursor:pointer;background:none;border:none;font-family:var(--font);}
  .review-row{display:flex;justify-content:space-between;gap:14px;padding:10px 16px;border-bottom:1px solid var(--line);}
  .review-row:last-child{border-bottom:none;}
  .review-row .k{font-size:12px;color:var(--muted);font-weight:500;flex:1;}
  .review-row .v{font-size:13px;font-weight:600;text-align:right;max-width:62%;word-break:break-word;}
  .review-row .v.empty{color:#BFC3D2;font-style:italic;font-weight:400;}
  .review-row .v.mono{font-family:var(--mono);}
  .rev-tasks{padding:6px 16px 12px;display:flex;flex-direction:column;gap:7px;}
  .rev-task{display:flex;gap:9px;font-size:12px;align-items:baseline;}
  .rev-task .rn{font-family:var(--mono);font-size:10px;font-weight:600;color:#fff;background:var(--indigo);border-radius:5px;padding:1px 6px;flex:none;}
  .rev-task .rt{font-weight:600;flex:1;}
  .rev-task .rd{color:var(--muted);font-family:var(--mono);font-size:11px;flex:none;}
  .verdict{margin:0 22px 16px;border-radius:var(--radius);padding:15px 16px;display:flex;align-items:center;gap:13px;background:var(--indigo-tint);}
  .verdict .vchip{width:46px;height:46px;border-radius:12px;background:var(--indigo);display:grid;place-items:center;flex:none;}
  .verdict .vchip span{font-family:var(--mono);font-size:15px;font-weight:700;color:#fff;}
  .verdict .vt{flex:1;}
  .verdict .vt span{display:block;font-size:11px;font-weight:600;color:var(--indigo-deep);opacity:.8;text-transform:uppercase;letter-spacing:.05em;}
  .verdict .vt strong{font-size:16px;color:var(--ink);}
  .verdict .vpct{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--indigo-deep);}

  .success{position:absolute;inset:0;z-index:30;background:var(--surface);display:none;flex-direction:column;align-items:center;justify-content:center;padding:40px 30px;text-align:center;}
  .success.show{display:flex;animation:fade .4s;}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  .success .seal{width:96px;height:96px;border-radius:50%;background:var(--indigo-tint);display:grid;place-items:center;margin-bottom:22px;animation:pop .5s cubic-bezier(.2,1.4,.4,1) .1s backwards;}
  @keyframes pop{from{transform:scale(0);}to{transform:scale(1);}}
  .success .seal svg{width:48px;height:48px;color:var(--indigo);}
  .success h2{font-size:23px;font-weight:700;letter-spacing:-.01em;}
  .success p{font-size:13.5px;color:var(--ink-soft);margin-top:10px;max-width:280px;}
  .success .ref{margin-top:18px;font-family:var(--mono);font-size:13px;font-weight:600;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:10px 16px;color:var(--ink-soft);}
  .success .again{margin-top:26px;background:none;border:none;color:var(--indigo-deep);font-weight:600;font-size:14px;font-family:var(--font);cursor:pointer;}
</style>
</head>
<body>
<div class="app" id="app">
  <header class="top">
    <div class="brand">
      <div class="mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2 6 4-14 2 8h6"/></svg>
      </div>
      <div class="brand-txt">
        <h1>SQA Work Plan</h1>
        <p>QA Master Project · 2026</p>
      </div>
      <div class="doc-ref"><div class="lbl">Form</div><div class="val">SQA-WP26</div></div>
    </div>
    <nav class="stepper" id="stepper"></nav>
  </header>

  <main class="body" id="body"></main>

  <div class="savebar" id="savebar"><span class="sd"></span><span id="saveTxt">บันทึกอัตโนมัติ</span></div>
  <footer class="nav" id="footnav"></footer>

  <div class="success" id="success">
    <div class="seal"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>
    <h2>ส่งแผนงานเรียบร้อย</h2>
    <p>บันทึกโครงการเข้าสู่ QA Master Project Plan แล้ว ทีมจะตรวจสอบและติดตามความคืบหน้าต่อไป</p>
    <div class="ref" id="successRef">REF —</div>
    <button class="again" id="againBtn">+ สร้างโครงการใหม่</button>
  </div>
</div>

<script>
const PILLARS=[
  {n:1,key:"Supply Chain Resilience",th:"Supply Chain Resilience",d:"ความยืดหยุ่นของซัพพลายเชน",c:"--p1",t:"--p1t"},
  {n:2,key:"Cost Excellence",th:"Cost Excellence",d:"การบริหารต้นทุน",c:"--p2",t:"--p2t"},
  {n:3,key:"Brand & Business Expansion",th:"Brand & Business Expansion",d:"การขยายแบรนด์และธุรกิจ",c:"--p3",t:"--p3t"},
  {n:4,key:"QA System & Governance",th:"QA System & Governance",d:"ระบบและธรรมาภิบาล QA",c:"--p4",t:"--p4t"},
  {n:5,key:"QA Database & Specification",th:"QA Database & Specification",d:"ฐานข้อมูลและข้อมูลจำเพาะ",c:"--p5",t:"--p5t"},
];
const GATES=[
  {code:"M0",t:"Kick-off",d:"เริ่มโครงการ · วางไทม์ไลน์ · จัดทีม",pct:10},
  {code:"M1",t:"Plan approved",d:"อนุมัติแผนงาน ขอบเขต และทรัพยากร",pct:20},
  {code:"M2",t:"Sample approved",d:"ทดสอบเสร็จ · แบรนด์อนุมัติตัวอย่าง",pct:50},
  {code:"M3",t:"Trial run complete",d:"ทดลองที่ร้าน/นำร่องเสร็จ · เก็บผลตอบรับ",pct:80},

let state={step:0,data:{},tasks:[]};
let _hadSaved=false;
try{const s=JSON.parse(localStorage.getItem(LS_KEY));if(s){state=Object.assign({step:0,data:{},tasks:[]},s);_hadSaved=true;}}catch(e){}
if(!_hadSaved && SQA_SEED.length){ state.tasks=SQA_SEED.slice(); state.data.plan_name="SQA Work Plan 2026"; state.data.plan_year="2026"; }
STEPS.forEach(s=>s.fields.forEach(f=>{if(f.key&&state.data[f.key]===undefined&&f.value!==undefined)state.data[f.key]=f.value;}));
if(state.data.progress===undefined)state.data.progress=0;
if(!state.tasks)state.tasks=[];

const REVIEW_INDEX=STEPS.length;
let saveTimer=null;
function save(flash){try{localStorage.setItem(LS_KEY,JSON.stringify(state));}catch(e){}if(flash!==false)pingSave();}
function pingSave(){const bar=document.getElementById("savebar"),txt=document.getElementById("saveTxt");if(!bar)return;bar.classList.add("flash");txt.textContent="บันทึกแล้ว";clearTimeout(saveTimer);saveTimer=setTimeout(()=>{bar.classList.remove("flash");txt.textContent="บันทึกอัตโนมัติ";},1100);}
function val(k){return state.data[k];}
function setVal(k,v){state.data[k]=v;save();}

const $=(s,el=document)=>el.querySelector(s);
const body=$("#body"),footnav=$("#footnav"),stepperEl=$("#stepper");
function esc(s){return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

function renderStepper(){
  stepperEl.innerHTML="";const cur=Math.min(state.step,REVIEW_INDEX);
  STEPS.forEach((s,i)=>{
    if(i>0){const bar=document.createElement("div");bar.className="bar";const fill=document.createElement("i");fill.style.width=(cur>i?"100%":cur===i?"50%":"0%");bar.appendChild(fill);stepperEl.appendChild(bar);}
    const node=document.createElement("div");node.className="node";node.dataset.state=cur>i?"done":cur===i?"active":"todo";
    const dot=document.createElement("div");dot.className="dot";
    dot.innerHTML=cur>i?'<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>':(i+1);
    node.appendChild(dot);node.onclick=()=>{if(i<=(state.maxStep||0))goTo(i);};stepperEl.appendChild(node);
  });
}

function fieldLabel(f){return `<label class="flabel"><span class="th">${esc(f.th)}${f.required?'<span class="req"> *</span>':''}</span>${f.en?`<span class="en">${esc(f.en)}</span>`:''}</label>`;}

function renderField(f){
  const wrap=document.createElement("div");wrap.className="field";wrap.dataset.key=f.key;
  let html=fieldLabel(f);
  if(f.type==="text"){ html+=`<input class="ctrl" type="text" data-k="${f.key}" placeholder="${esc(f.placeholder||'')}" value="${esc(val(f.key)||'')}">`; }
  else if(f.type==="textarea"){ html+=`<textarea class="ctrl" data-k="${f.key}" placeholder="${esc(f.placeholder||'')}">${esc(val(f.key)||'')}</textarea>`; }
  else if(f.type==="select"||f.type==="milestone"){
    html+=selectHTML(f);
    if(f.hint) html+=`<div class="hint sel-hint" data-hintfor="${f.key}" style="margin-top:7px">${esc(hintText(f,val(f.key)))}</div>`;
  }
  else if(f.type==="pillars"){
    html+=`<div class="pillars" data-k="${f.key}">`+PILLARS.map(p=>`<div class="pillar ${val(f.key)===p.key?'sel':''}" data-val="${esc(p.key)}" style="--pc:var(${p.c});--pct:var(${p.t})"><div class="pnum">${p.n}</div><div><div class="pt">${esc(p.th)}</div><div class="pd">${esc(p.d)}</div></div></div>`).join("")+`</div>`;
  }
  else if(f.type==="gates"){
    const curIdx=GATES.findIndex(g=>g.code===val(f.key));
    html+=`<div class="gates" data-k="${f.key}">`+GATES.map((g,i)=>`<div class="gate ${val(f.key)===g.code?'sel':''} ${curIdx>-1&&i<curIdx?'passed':''}" data-val="${g.code}" data-pct="${g.pct}"><div class="gcode">${g.code}</div><div class="gmid"><div class="gt">${esc(g.t)}</div><div class="gd">${esc(g.d)}</div></div><div class="gpct">${g.pct}%</div></div>`).join("")+`</div>`;
  }
  else if(f.type==="slider"){
    const v=val(f.key)??0;
    html+=`<div class="progwrap"><div class="ptop"><div class="pval" data-pval>${v}%</div><div class="ptag" data-ptag>${progTag(v)}</div></div><input type="range" min="0" max="100" step="5" value="${v}" data-k="${f.key}"><div class="pscale"><span>0</span><span>25</span><span>50</span><span>75</span><span>100</span></div></div>`;
  }
  else if(f.type==="segment"){
    html+=`<div class="segment" data-k="${f.key}">`+f.options.map(o=>`<button type="button" class="segbtn ${val(f.key)===o.value?'on':''}" data-val="${esc(o.value)}" data-tone="${o.tone||''}"><span class="sc"></span>${esc(o.label)}</button>`).join("")+`</div>`;
  }
  else if(f.type==="tasklist"){
    html+=`<div class="tasklist" data-k="tasks">`+state.tasks.map((t,i)=>taskHTML(t,i)).join("")+`</div>
      <div class="add-task" id="addTask" style="margin-top:10px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>เพิ่มงาน</div>
      <div class="hint" style="margin-top:8px">เลือกงานจากรายการมาตรฐาน หรือพิมพ์เอง พร้อมระบุกำหนดเวลา</div>`;
  }
  html+=`<div class="err-msg">กรุณาเลือก/กรอกข้อมูลนี้</div>`;
  wrap.innerHTML=html;return wrap;
}

function progTag(v){ v=+v; if(v>=100)return"เสร็จสมบูรณ์";if(v>=80)return"ใกล้เสร็จ";if(v>=50)return"ผ่านครึ่งทาง";if(v>=20)return"กำลังดำเนินการ";if(v>0)return"เริ่มต้น";return"ยังไม่เริ่ม";}

function taskHTML(t,i){
  const opts=[`<option value="" ${!t.detail?'selected':''} disabled hidden>เลือกงาน…</option>`]
    .concat(TASK_TEMPLATES.map(o=>`<option value="${esc(o)}" ${t.detail===o?'selected':''}>${esc(o)}</option>`))
    .concat(`<option value="__other__" ${t.detail&&!TASK_TEMPLATES.includes(t.detail)?'selected':''}>อื่นๆ (พิมพ์เอง)…</option>`);
  const isOther=t.detail&&!TASK_TEMPLATES.includes(t.detail);
  const tlOther=t.timeline&&!TIMELINE_OPTS.includes(t.timeline);
  const tlOpts=[`<option value="" ${!t.timeline?'selected':''} disabled hidden>เลือก…</option>`]
    .concat(TIMELINE_OPTS.map(o=>`<option value="${esc(o)}" ${t.timeline===o?'selected':''}>${esc(o)}</option>`))
    .concat(`<option value="__other__" ${tlOther?'selected':''}>อื่นๆ (พิมพ์เอง)…</option>`).join("");
  return `<div class="task" data-ti="${i}">
    <div class="trow1"><div class="tnum">${i+1}</div><span style="font-size:12px;font-weight:600;color:var(--muted)">งานที่ ${i+1}</span><button type="button" class="tdel" data-tdel="${i}">×</button></div>
    ${(t.brand||t.pic||t.project||t.supplier)?`<div class="timeta">${t.brand?`<span class="tchip brand">${esc(t.brand)}</span>`:""}${t.pic?`<span class="tchip">PIC: ${esc(t.pic)}</span>`:""}${t.supplier?`<span class="tchip">${esc(t.supplier)}</span>`:""}${t.project?`<div class="tproj">${esc(t.project)}</div>`:""}</div>`:""}
    <div class="selwrap" style="margin-bottom:9px"><select class="mini task-detail" data-ti="${i}">${opts.join("")}</select></div>
    <input class="mini task-other" data-ti="${i}" placeholder="ระบุชื่องาน…" value="${esc(isOther?t.detail:'')}" style="margin-bottom:9px;display:${isOther?'block':'none'}">
    <div class="tcols">
      <div class="col"><span class="sublbl">กำหนดเวลา</span>
        <div class="selwrap"><select class="mini task-timeline" data-ti="${i}">${tlOpts}</select></div>
        <input class="mini task-timeline-other" data-ti="${i}" placeholder="ระบุ เช่น by 15 May" value="${esc(tlOther?t.timeline:'')}" style="margin-top:8px;display:${tlOther?'block':'none'}">
      </div>
      <div class="col"><span class="sublbl">สถานะ</span><div class="selwrap"><select class="mini task-status" data-ti="${i}">${["Not Start","In progress","Done","Approved"].map(s=>`<option ${t.status===s?'selected':''}>${s}</option>`).join("")}</select></div></div>
    </div>
  </div>`;
}

function hintText(f,v){
  if(!v) return "เลือกเพื่อดูรายละเอียด";
  if(f.hint==="pillar"){ const p=PILLARS.find(x=>x.key===v); return p?p.d:""; }
  if(f.hint==="milestone"){ const g=GATES.find(x=>x.code===v); return g?(g.t+" · "+g.d+" · ความคืบหน้า "+g.pct+"%"):""; }
  return "";
}
function optLabel(f,o){
  if(f.type==="milestone"){ const g=GATES.find(x=>x.code===o); return g?(g.code+" · "+g.t+" ("+g.pct+"%)"):o; }
  return o;
}
function selectHTML(f){
  const cur=val(f.key),isOther=f.allowOther&&cur!=null&&cur!==""&&!f.options.includes(cur);
  const opts=[`<option value="" ${!cur?'selected':''} disabled hidden>เลือก…</option>`].concat(f.options.map(o=>`<option value="${esc(o)}" ${cur===o?'selected':''}>${esc(optLabel(f,o))}</option>`));
  if(f.allowOther)opts.push(`<option value="__other__" ${isOther?'selected':''}>อื่นๆ (พิมพ์เอง)…</option>`);
  return `<div class="selwrap"><select class="ctrl ${cur?'':'placeheld'}" data-k="${f.key}" data-other="${f.allowOther?1:0}">${opts.join("")}</select></div>
    <input class="ctrl other-input" data-otherfor="${f.key}" placeholder="ระบุ…" value="${esc(isOther?cur:'')}" style="margin-top:9px;display:${isOther?'block':'none'}">`;
}

function renderStep(){
  body.scrollTop=0;
  if(state.step===REVIEW_INDEX){renderReview();renderNav();renderStepper();return;}
  const s=STEPS[state.step];
  body.innerHTML=`<div class="step-head"><div class="step-kicker"><span class="seg">ขั้นที่ ${state.step+1}/${STEPS.length}</span> · ${esc(s.tick)}</div><h2>${esc(s.title)}</h2><div class="sub">${esc(s.sub)}</div></div><div class="fields" id="fields"></div>`;
  const fc=$("#fields");s.fields.forEach(f=>fc.appendChild(renderField(f)));
  bindFields(fc);renderNav();renderStepper();
}

function bindFields(scope){
  scope.querySelectorAll("[data-k]").forEach(el=>{
    if(el.tagName==="SELECT"){
      el.addEventListener("change",()=>{
        el.classList.toggle("placeheld",!el.value);
        const oi=scope.querySelector(`[data-otherfor="${el.dataset.k}"]`);
        if(el.dataset.other==="1"&&el.value==="__other__"){if(oi){oi.style.display="block";oi.focus();setVal(el.dataset.k,oi.value||"");}}
        else{if(oi)oi.style.display="none";setVal(el.dataset.k,el.value);}
        // hint + milestone auto-progress
        const fdef=STEPS[state.step].fields.find(x=>x.key===el.dataset.k);
        if(fdef){
          const h=scope.querySelector(`[data-hintfor="${el.dataset.k}"]`);
          if(h&&fdef.hint)h.textContent=hintText(fdef,el.value);
          if(fdef.type==="milestone"){
            const g=GATES.find(x=>x.code===el.value);
            if(g){ setVal("progress",g.pct);
              const sl=scope.querySelector('input[type=range][data-k="progress"]');
              if(sl){ sl.value=g.pct; const pv=scope.querySelector("[data-pval]"),pt=scope.querySelector("[data-ptag]"); if(pv)pv.textContent=g.pct+"%"; if(pt)pt.textContent=progTag(g.pct); }
            }
          }
        }
        clearErr(el);
      });
    } else if(el.tagName==="INPUT"&&el.type==="range"){
      el.addEventListener("input",()=>{ setVal(el.dataset.k,+el.value); const pv=scope.querySelector("[data-pval]"),pt=scope.querySelector("[data-ptag]"); if(pv)pv.textContent=el.value+"%"; if(pt)pt.textContent=progTag(el.value); });
    } else if((el.tagName==="INPUT"||el.tagName==="TEXTAREA")&&!el.classList.contains("task-detail")&&!el.classList.contains("task-other")&&!el.classList.contains("task-timeline")){
      el.addEventListener("input",()=>{setVal(el.dataset.k,el.value);clearErr(el);});
    }
  });
  scope.querySelectorAll(".other-input").forEach(oi=>oi.addEventListener("input",()=>{setVal(oi.dataset.otherfor,oi.value);clearErr(oi);}));
  // pillars
  scope.querySelectorAll(".pillars").forEach(box=>{const key=box.dataset.k;box.querySelectorAll(".pillar").forEach(p=>p.addEventListener("click",()=>{box.querySelectorAll(".pillar").forEach(x=>x.classList.remove("sel"));p.classList.add("sel");setVal(key,p.dataset.val);clearErr(p);}));});
  // gates -> auto progress
  scope.querySelectorAll(".gates").forEach(box=>{const key=box.dataset.k;box.querySelectorAll(".gate").forEach((g,gi)=>g.addEventListener("click",()=>{
    box.querySelectorAll(".gate").forEach((x,xi)=>{x.classList.remove("sel");x.classList.toggle("passed",xi<gi);});
    g.classList.add("sel");setVal(key,g.dataset.val);
    setVal("progress",+g.dataset.pct);clearErr(g);
  })); });
  // segment
  scope.querySelectorAll(".segment").forEach(seg=>{const key=seg.dataset.k;seg.querySelectorAll(".segbtn").forEach(b=>b.addEventListener("click",()=>{seg.querySelectorAll(".segbtn").forEach(x=>x.classList.remove("on"));b.classList.add("on");setVal(key,b.dataset.val);clearErr(b);}));});
  // tasklist
  const addBtn=scope.querySelector("#addTask");
  if(addBtn)addBtn.addEventListener("click",()=>{state.tasks.push({detail:"",timeline:"",status:"Not Start"});save();renderStep();});
  scope.querySelectorAll(".task-detail").forEach(sel=>sel.addEventListener("change",()=>{
    const i=+sel.dataset.ti,oi=scope.querySelector(`.task-other[data-ti="${i}"]`);
    if(sel.value==="__other__"){if(oi){oi.style.display="block";oi.focus();state.tasks[i].detail=oi.value||"";}}
    else{if(oi)oi.style.display="none";state.tasks[i].detail=sel.value;}
    save();
  }));
  scope.querySelectorAll(".task-other").forEach(oi=>oi.addEventListener("input",()=>{state.tasks[+oi.dataset.ti].detail=oi.value;save();}));
  scope.querySelectorAll(".task-timeline").forEach(sel=>sel.addEventListener("change",()=>{
    const i=+sel.dataset.ti,oi=scope.querySelector(`.task-timeline-other[data-ti="${i}"]`);
    if(sel.value==="__other__"){if(oi){oi.style.display="block";oi.focus();state.tasks[i].timeline=oi.value||"";}}
    else{if(oi)oi.style.display="none";state.tasks[i].timeline=sel.value;}
    save();
  }));
  scope.querySelectorAll(".task-timeline-other").forEach(oi=>oi.addEventListener("input",()=>{state.tasks[+oi.dataset.ti].timeline=oi.value;save();}));
  scope.querySelectorAll(".task-status").forEach(sel=>sel.addEventListener("change",()=>{state.tasks[+sel.dataset.ti].status=sel.value;save();}));
  scope.querySelectorAll("[data-tdel]").forEach(b=>b.addEventListener("click",()=>{state.tasks.splice(+b.dataset.tdel,1);save();renderStep();}));
  scope.querySelectorAll(".grp").forEach(g=>{g.addEventListener("focusin",()=>g.classList.add("focuswithin"));g.addEventListener("focusout",()=>g.classList.remove("focuswithin"));});
}

function clearErr(el){const f=el.closest(".field");if(f)f.classList.remove("invalid");}

function validateStep(){
  const s=STEPS[state.step];let ok=true,firstBad=null;
  s.fields.forEach(f=>{if(!f.required)return;const v=val(f.key);if(v==null||v===""){ok=false;const el=body.querySelector(`.field[data-key="${f.key}"]`);if(el){el.classList.add("invalid");if(!firstBad)firstBad=el;}}});
  if(firstBad)body.scrollTo({top:Math.max(0,firstBad.offsetTop-90),behavior:"smooth"});
  return ok;
}

function renderReview(){
  const prog=val("progress")??0, ms=val("milestone")||"—";
  let html=`<div class="step-head"><div class="step-kicker"><span class="seg">ตรวจทาน</span> · Review</div><h2>ตรวจทานก่อนส่ง</h2><div class="sub">ตรวจสอบรายละเอียดแผนงานก่อนส่งเข้าระบบ</div></div>`;
  html+=`<div class="verdict"><div class="vchip"><span>${esc(ms)}</span></div><div class="vt"><span>${esc(val("pillar")||'')}</span><strong>${esc(val("title")||'(ยังไม่ระบุชื่อโครงการ)')}</strong></div><div class="vpct">${prog}%</div></div>`;
  STEPS.forEach((s,si)=>{
    let rows="";
    s.fields.forEach(f=>{
      if(f.type==="tasklist")return;
      if(f.type==="slider"){rows+=reviewRow(f.th,(val(f.key)??0)+"%",true);}
      else if(f.type==="milestone"){const g=GATES.find(x=>x.code===val(f.key));rows+=reviewRow(f.th,g?(g.code+" · "+g.t):null,false);}
      else rows+=reviewRow(f.th,val(f.key),f.type==="select");
    });
    html+=`<div class="review-group"><div class="rg-head"><span class="t">${esc(s.title)}</span><button class="edit" data-edit="${si}">แก้ไข</button></div>${rows}`;
    if(s.fields.some(f=>f.type==="tasklist")){
      const valid=state.tasks.filter(t=>t.detail);
      if(valid.length)html+=`<div class="rev-tasks">${valid.map((t,i)=>`<div class="rev-task"><span class="rn">${i+1}</span><span class="rt">${esc(t.detail)}</span><span class="rd">${esc(t.timeline||'—')} · ${esc(t.status||'')}</span></div>`).join("")}</div>`;
      else html+=`<div class="rev-tasks"><div class="rev-task" style="color:var(--muted)">ยังไม่มีรายการงาน</div></div>`;
    }
    html+=`</div>`;
  });
  body.innerHTML=html;
  body.querySelectorAll("[data-edit]").forEach(b=>b.addEventListener("click",()=>goTo(+b.dataset.edit)));
}
function reviewRow(k,v,mono){return `<div class="review-row"><span class="k">${esc(k)}</span><span class="v ${mono?'mono':''} ${v==null||v===''?'empty':''}">${(v==null||v==='')?'—':esc(v)}</span></div>`;}

function renderNav(){
  const last=state.step===REVIEW_INDEX;footnav.innerHTML="";
  if(state.step>0){const back=document.createElement("button");back.className="btn btn-ghost";back.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>';back.onclick=()=>goTo(state.step-1);footnav.appendChild(back);}
  const next=document.createElement("button");next.className="btn btn-primary";
  if(last){next.innerHTML='ส่งแผนงาน <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 5 5L20 7"/></svg>';next.onclick=submitForm;}
  else{next.innerHTML='ถัดไป <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>';next.onclick=()=>{if(validateStep())goTo(state.step+1);};}
  footnav.appendChild(next);
}
function goTo(i){state.step=Math.max(0,Math.min(REVIEW_INDEX,i));state.maxStep=Math.max(state.maxStep||0,state.step);save(false);renderStep();}

function submitForm(){
  const ref="WP26-"+(val("brand")||"QA").replace(/[^A-Za-z]/g,"").slice(0,4).toUpperCase()+"-"+Math.floor(1000+Math.random()*9000);
  $("#successRef").textContent="REF · "+ref;$("#success").classList.add("show");
}
$("#againBtn").onclick=()=>{state={step:0,data:{},tasks:[],maxStep:0};STEPS.forEach(s=>s.fields.forEach(f=>{if(f.key&&f.value!==undefined)state.data[f.key]=f.value;}));state.data.progress=0;save(false);$("#success").classList.remove("show");renderStep();};

renderStep();
</script>
</body>
</html>
